<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Studio Floor</title>
<style>
  :root {
    --bg: #08090d;
    --panel: #0d1015;
    --panel-2: #11151c;
    --field: #0a0d12;
    --line: rgba(148,163,184,.09);
    --line-2: rgba(148,163,184,.17);
    --text: #e4e8f0;
    --dim: #8a93a4;
    --faint: #545d6d;
    --running: #4ad991;
    --warn: #e0bc55;
    --error: #e2636d;
    --info: #6fa8d1;
    --glass: rgba(11,13,18,.72);
    --shadow: 0 10px 30px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.35);
    --sans: "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, sans-serif;
    --mono: "Cascadia Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  html, body { height: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 12.5px/1.55 var(--sans);
    display: grid; grid-template-columns: 1fr 344px; overflow: hidden; }
  ::selection { background: rgba(74,217,145,.25); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,.16); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,.28); }

  #stage { position: relative; overflow: hidden; }
  #stage::after { content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 38%, transparent 55%, rgba(0,0,0,.42));
    z-index: 2; }
  canvas { display: block; cursor: grab; }
  canvas.grabbing { cursor: grabbing; }

  .sec { font-size: 10px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase;
    color: var(--faint); }

  #side { border-left: 1px solid var(--line-2); min-height: 0;
    background: linear-gradient(180deg, var(--panel-2), var(--panel) 140px);
    display: flex; flex-direction: column; }
  header { padding: 14px 16px 12px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  h1 { margin: 0; font-size: 13px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase;
    background: linear-gradient(90deg, #f0f4fb, #97a2b6); -webkit-background-clip: text;
    background-clip: text; color: transparent; }
  #conn { font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
    color: var(--dim); padding: 3px 9px 3px 7px; border: 1px solid var(--line-2); border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  #conn::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--faint); }
  #conn.live { color: var(--running); border-color: rgba(74,217,145,.3); }
  #conn.live::before { background: var(--running); box-shadow: 0 0 6px var(--running);
    animation: pulse 2.2s ease-in-out infinite; }
  #conn.down { color: var(--error); border-color: rgba(226,99,109,.3); }
  #conn.down::before { background: var(--error); }
  @keyframes pulse { 50% { opacity: .45; } }

  #stats { padding: 12px 16px; border-bottom: 1px solid var(--line);
    display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  #stats .sec { grid-column: 1 / -1; margin-bottom: 2px; }
  .stat { display: flex; flex-direction: column; gap: 1px; padding: 7px 10px 6px;
    background: var(--field); border: 1px solid var(--line); border-radius: 8px; }
  .stat span { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--faint); order: 2; }
  .stat b { font: 600 14px/1.2 var(--mono); font-variant-numeric: tabular-nums; order: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #feed-head { padding: 10px 16px 6px; }
  #feed { overflow-y: auto; padding: 0 6px 6px; min-height: 60px; flex: 1; }
  .ev { padding: 2.5px 10px; margin: 0 0 1px; border-radius: 6px;
    display: grid; grid-template-columns: 34px 1fr; gap: 9px; align-items: baseline;
    font-family: var(--mono); font-size: 11.5px; }
  .ev:hover { background: rgba(148,163,184,.07); }
  .ev .seq { color: var(--faint); text-align: right; font-variant-numeric: tabular-nums; font-size: 10.5px; }
  .ev .t { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ev.terminal .t { color: var(--text); font-weight: 600; }
  .ev.bad .t { color: var(--error); }

  #compose { padding: 12px 16px; border-top: 1px solid var(--line); display: grid; gap: 7px; }
  #compose select, #compose textarea, #compose button, #compose input[type=text] {
    font: inherit; font-size: 12.5px; background: var(--field); color: var(--text);
    border: 1px solid var(--line-2); border-radius: 8px; padding: 7px 10px;
    transition: border-color .15s, box-shadow .15s, background .15s; }
  #compose select:hover, #compose input[type=text]:hover, #compose textarea:hover { border-color: rgba(148,163,184,.3); }
  #compose select:focus, #compose textarea:focus, #compose input[type=text]:focus { outline: none;
    border-color: rgba(74,217,145,.55); box-shadow: 0 0 0 3px rgba(74,217,145,.12); }
  #compose ::placeholder { color: var(--faint); }
  #project-form { display: grid; gap: 7px; padding: 10px; border: 1px solid var(--line-2);
    border-radius: 10px; background: var(--panel-2); }
  #project-form input[type=text] { width: 100%; }
  #np-git-wrap { display: flex; align-items: center; gap: 6px; color: var(--dim);
    font-size: 11.5px; padding: 0 4px; }
  #np-git-wrap input { accent-color: var(--running); }
  #project.none { border-color: rgba(226,99,109,.5); }
  #compose textarea { resize: vertical; min-height: 52px; font-family: var(--sans); }
  #compose button, #ask button, #scrub button, #detail button { cursor: pointer;
    background: linear-gradient(180deg, #1b212c, #151a23); border: 1px solid var(--line-2);
    color: var(--text); font-weight: 600; }
  #compose button:hover, #ask button:hover, #scrub button:hover, #detail button:hover {
    background: linear-gradient(180deg, #222a37, #1a202b); border-color: rgba(148,163,184,.3); }
  #compose button:active { transform: translateY(1px); }
  #send { background: linear-gradient(180deg, #3fce88, #2aa96b) !important;
    border-color: rgba(74,217,145,.5) !important; color: #04170d !important;
    font-weight: 700; letter-spacing: .02em; }
  #send:hover { background: linear-gradient(180deg, #52dd97, #31b876) !important;
    box-shadow: 0 2px 12px rgba(74,217,145,.25); }
  #compose .row { display: grid; grid-template-columns: 1fr auto; gap: 7px; }
  #sent { color: var(--dim); font-size: 11.5px; min-height: 15px; }

  #ask { padding: 13px 16px; border-top: 1px solid rgba(224,188,85,.35);
    background: linear-gradient(180deg, rgba(224,188,85,.10), rgba(224,188,85,.03)); }
  #ask h2 { margin: 0 0 5px; font-size: 11px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--warn); display: flex; align-items: center; gap: 7px; }
  #ask h2::before { content: ""; width: 7px; height: 7px; border-radius: 50%;
    background: var(--warn); box-shadow: 0 0 8px var(--warn); animation: pulse 1.6s ease-in-out infinite; }
  #ask p { margin: 0 0 10px; font-size: 12.5px; color: var(--text); }
  #ask .row { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  #ask button { font: inherit; border-radius: 8px; padding: 6px 8px; }
  #ask-yes { border-color: rgba(224,188,85,.45) !important; color: var(--warn) !important; }
  #ask-no { border-color: rgba(226,99,109,.4) !important; color: var(--error) !important; }

  #help { padding: 9px 16px 11px; border-top: 1px solid var(--line); color: var(--faint); font-size: 11px; }
  kbd { background: rgba(148,163,184,.12); border: 1px solid var(--line-2); border-bottom-width: 2px;
    border-radius: 4px; padding: 0 5px; color: var(--dim); font: 600 10.5px var(--mono); }

  .overlay { background: var(--glass); backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border: 1px solid var(--line-2); border-radius: 12px; box-shadow: var(--shadow); }

  #detail { position: absolute; right: 14px; top: 14px; width: 262px; display: none;
    padding: 13px 14px; font-size: 12.5px; z-index: 6; }
  #detail h2 { margin: 0 0 8px; font-size: 12px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  #detail .k { color: var(--dim); }
  #detail .row { display: flex; justify-content: space-between; gap: 8px; padding: 1.5px 0; }
  #detail .row span:last-child { font-family: var(--mono); font-size: 11.5px; }
  #detail .sum { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line); color: var(--dim); }
  #detail button { margin-top: 11px; width: 100%; font: 600 12px var(--sans);
    border-radius: 8px; padding: 6px; }

  #tip { position: absolute; pointer-events: none; max-width: 290px; display: none;
    padding: 9px 12px; font-size: 12px; z-index: 5; }
  #tip b { display: block; margin-bottom: 3px; font-size: 12.5px; }
  #tip .s { color: var(--dim); font-size: 11.5px; }

  #track { position: absolute; left: 14px; bottom: 14px; right: 196px; display: none;
    padding: 10px 14px; z-index: 4; }
  #track .name { color: var(--dim); font-size: 10.5px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; margin-bottom: 8px; }
  #track .lane { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 3px 11px; border-radius: 999px; border: 1px solid var(--line-2);
    background: rgba(148,163,184,.06); color: var(--dim); font: 500 11px var(--mono); }
  .chip.active { border-color: rgba(74,217,145,.6); color: var(--running);
    background: rgba(74,217,145,.10); box-shadow: 0 0 10px rgba(74,217,145,.15); }
  .chip.done { color: var(--text); background: rgba(148,163,184,.10); }
  .chip.skipped { opacity: .38; text-decoration: line-through; }
  .gate { font: 600 10.5px var(--mono); padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line-2); }
  .gate.pass { color: var(--running); border-color: rgba(74,217,145,.35); background: rgba(74,217,145,.07); }
  .gate.fail { color: var(--error); border-color: rgba(226,99,109,.4); background: rgba(226,99,109,.08); }
  .arrow { color: var(--faint); }

  #minimap { position: absolute; right: 14px; bottom: 14px; z-index: 4; padding: 7px;
    background: var(--glass); backdrop-filter: blur(14px);
    border: 1px solid var(--line-2); border-radius: 12px; box-shadow: var(--shadow); }

  #scrub { position: absolute; left: 14px; top: 52px; z-index: 4; display: flex; align-items: center;
    gap: 10px; padding: 7px 12px; }
  #scrub input { width: 190px; accent-color: var(--running); }
  #scrub .lbl { color: var(--dim); font: 600 10.5px var(--mono); min-width: 74px;
    letter-spacing: .06em; text-transform: uppercase; }
  #scrub button { font: 600 10.5px var(--sans); letter-spacing: .06em; text-transform: uppercase;
    border-radius: 6px; padding: 3px 9px; }

  #cam { position: absolute; left: 14px; top: 14px; color: var(--dim);
    font: 600 10.5px var(--mono); letter-spacing: .08em; text-transform: uppercase;
    padding: 5px 10px; z-index: 4; }
</style>
</head>
<body>
<div id="stage">
  <div id="tip" class="overlay"></div><div id="cam" class="overlay">isometric</div><div id="detail" class="overlay"></div>
  <div id="scrub" class="overlay"><span class="lbl">live</span><input id="seek" type="range" min="0" max="0" value="0"><button id="tolive">latest</button></div>
  <div id="track" class="overlay"><div class="name"></div><div class="lane"></div></div>
  <canvas id="minimap" width="150" height="98"></canvas>
</div>
<div id="side">
  <header><h1>Studio Floor</h1><div id="conn">connecting</div></header>
  <div id="stats">
    <div class="sec">telemetry</div>
    <div class="stat"><span>run</span><b id="s-run">-</b></div>
    <div class="stat"><span>events</span><b id="s-events">0</b></div>
    <div class="stat"><span>tokens</span><b id="s-tokens">0</b></div>
    <div class="stat"><span>spend</span><b id="s-spend">$0.0000</b></div>
    <div class="stat"><span>cache hit</span><b id="s-cache">-</b></div>
    <div class="stat"><span>symbols</span><b id="s-symbols">-</b></div>
  </div>
  <div id="feed-head" class="sec">event stream</div>
  <div id="feed"></div>
  <div id="compose">
    <div class="sec">dispatch</div>
    <div class="row">
      <select id="project" title="the repo the crew works in"></select>
      <button id="new-project" title="create a project">new</button>
    </div>
    <div id="project-form" hidden>
      <input id="np-name" type="text" placeholder="name">
      <input id="np-root" type="text" placeholder="absolute path, e.g. D:\games\neon-drift">
      <div class="row">
        <select id="np-engine">
          <option value="godot">godot</option>
          <option value="unity">unity</option>
          <option value="ue5">ue5</option>
        </select>
        <label id="np-git-wrap"><input id="np-git" type="checkbox" checked> git</label>
      </div>
      <button id="np-create">create</button>
    </div>
    <div class="row">
      <select id="spend" title="what happens when a run gets expensive">
        <option value="400000">ask me every 400k tokens</option>
        <option value="1000000">ask me every 1M tokens</option>
        <option value="">run with any tokens</option>
      </select>
    </div>
    <div class="row">
      <select id="who"></select>
      <button id="mode-btn" title="switch between task and meeting">task</button>
    </div>
    <textarea id="brief" placeholder="what should they do?"></textarea>
    <button id="send">send to the floor</button>
    <div id="sent"></div>
  </div>
  <div id="ask" hidden>
    <h2>keep going?</h2>
    <p id="ask-body"></p>
    <div class="row">
      <button id="ask-yes">continue</button>
      <button id="ask-no">stop the run</button>
    </div>
  </div>
  <div id="help">drag pan &middot; wheel zoom &middot; click an agent to follow &middot; <kbd>O</kbd> orbit &middot; <kbd>Esc</kbd> release</div>
</div>

<script type="module">
import * as THREE from "/vendor/three.module.js";
import { buildOffice, wanderStep, refreshScreens, seatAtTable, leaveTable, showBoard, hideBoard } from "/scene.js";

const RING = { idle: 0x2f3644, running: 0x4ad991, blocked: 0xd9c24a, meeting: 0x6fa8d1, error: 0xd95555 };
const TERMINAL = new Set(["run_ended","meeting_ended","workflow_ended","decision_recorded","escalated","verify_result","budget_exhausted"]);
const BAD = new Set(["escalated","budget_exhausted","inconclusive_flagged"]);

const stage = document.getElementById("stage");
const tip = document.getElementById("tip");
const camLabel = document.getElementById("cam");

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.35;
stage.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08090d);
scene.fog = new THREE.Fog(0x08090d, 70, 190);

const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 400);
const orbit = { theta: Math.PI * 0.25, phi: Math.PI * 0.30, dist: 44, target: new THREE.Vector3(0, 0.5, 0) };
let freeCam = false;

scene.add(new THREE.AmbientLight(0x8fa0bc, 0.25));
scene.add(new THREE.HemisphereLight(0xb8ccf0, 0x14181f, 0.9));
const key = new THREE.DirectionalLight(0xfff2dc, 2.0);
key.position.set(18, 30, 14);
key.castShadow = true;
key.shadow.mapSize.set(4096, 4096);
key.shadow.camera.near = 1; key.shadow.camera.far = 110;
const S = 30;
key.shadow.camera.left = -S; key.shadow.camera.right = S;
key.shadow.camera.top = S; key.shadow.camera.bottom = -S;
key.shadow.bias = -0.0004;
key.shadow.normalBias = 0.03;
scene.add(key);

function fitShadowToFloor(f) {
  const pad = 3;
  const half = Math.max(f.width, f.height) / 2 + pad;
  key.shadow.camera.left = -half; key.shadow.camera.right = half;
  key.shadow.camera.top = half; key.shadow.camera.bottom = -half;
  key.shadow.camera.updateProjectionMatrix();
}
const fill = new THREE.DirectionalLight(0x4a6494, 0.45);
fill.position.set(-16, 12, -18);
scene.add(fill);

let avatars = new Map();
let ambient = [];
let meetingTable = null;
let following = null;
let selected = null;
const meetings = new Map();
const allEvents = [];
let scrubbing = false;
let workflow = null;
const state = new Map();
let stats = { events: 0, tokens: 0, spend: 0, cacheRead: 0, cacheWrite: 0, symbols: 0, run: "-", history: [], feed: [] };
let screensDirty = true;
let lastScreenPaint = 0;
let lastMini = 0;

function screenData() {
  const crewByDept = {};
  for (const [role, a] of avatars) {
    (crewByDept[a.dept] ||= []).push({
      role,
      tokens: deskState(role).tokens,
      color: "#" + (RING[deskState(role).ring] || RING.idle).toString(16).padStart(6, "0"),
    });
  }
  const tot = stats.cacheRead + stats.cacheWrite;
  return {
    run: stats.run, events: stats.events, tokens: stats.tokens, spend: stats.spend,
    cacheRead: stats.cacheRead, cacheWrite: stats.cacheWrite,
    cacheHit: tot ? (stats.cacheRead / tot) * 100 : null,
    history: stats.history, feed: stats.feed, crewByDept,
  };
}

function deskState(role) {
  if (!state.has(role)) state.set(role, { ring: "idle", summary: "", tool: "", tokens: 0 });
  return state.get(role);
}

function updateCamera() {
  const t = orbit.target;
  camera.position.set(
    t.x + orbit.dist * Math.sin(orbit.phi) * Math.cos(orbit.theta),
    t.y + orbit.dist * Math.cos(orbit.phi),
    t.z + orbit.dist * Math.sin(orbit.phi) * Math.sin(orbit.theta)
  );
  camera.lookAt(t);
}

const UP = new THREE.Vector3(0, 1, 0);
const GROUND = new THREE.Plane(UP, 0);
const panRay = new THREE.Raycaster();
const panNdc = new THREE.Vector2();
let anchor = null;

function groundAt(e) {
  const r = renderer.domElement.getBoundingClientRect();
  panNdc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  panNdc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  panRay.setFromCamera(panNdc, camera);
  const hit = new THREE.Vector3();
  return panRay.ray.intersectPlane(GROUND, hit) ? hit : null;
}
const el = renderer.domElement;
let dragging = false, dragged = false, lastX = 0, lastY = 0;

el.addEventListener("contextmenu", (e) => e.preventDefault());
el.addEventListener("pointerdown", (e) => {
  dragging = true; dragged = false; lastX = e.clientX; lastY = e.clientY;
  anchor = groundAt(e);
  el.classList.add("grabbing");
  el.setPointerCapture(e.pointerId);
});
el.addEventListener("pointerup", (e) => {
  dragging = false; anchor = null; el.classList.remove("grabbing");
  el.releasePointerCapture(e.pointerId);
});
el.addEventListener("pointermove", (e) => {
  if (!dragging) { hoverTest(e); return; }
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  if (Math.abs(dx) + Math.abs(dy) > 2) dragged = true;
  lastX = e.clientX; lastY = e.clientY;

  const rotating = freeCam && !e.shiftKey;
  if (rotating) {
    orbit.theta -= dx * 0.005;
    orbit.phi = Math.max(0.10, Math.min(Math.PI / 2 - 0.03, orbit.phi - dy * 0.004));
    updateCamera();
    return;
  }

  const now = groundAt(e);
  if (anchor && now) {
    orbit.target.x += anchor.x - now.x;
    orbit.target.z += anchor.z - now.z;
    updateCamera();
  }
});
el.addEventListener("wheel", (e) => {
  e.preventDefault();
  orbit.dist = Math.max(7, Math.min(110, orbit.dist * (1 + Math.sign(e.deltaY) * 0.12)));
  updateCamera();
}, { passive: false });

addEventListener("keydown", (e) => {
  if (e.key !== "o" && e.key !== "O") return;
  freeCam = !freeCam;
  camLabel.textContent = freeCam ? "orbit  (drag rotates, shift+drag pans)" : "isometric";
  if (!freeCam) { orbit.theta = Math.PI * 0.25; orbit.phi = Math.PI * 0.28; updateCamera(); }
});

const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function pickAgent(e) {
  const r = el.getBoundingClientRect();
  ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  let best = null, bestDist = Infinity;
  for (const [role, a] of avatars) {
    const hits = ray.intersectObject(a.hit, true);
    if (hits.length && hits[0].distance < bestDist) { bestDist = hits[0].distance; best = role; }
  }
  return best;
}

const detail = document.getElementById("detail");

function esc(v) {
  return String(v == null ? "" : v)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function showDetail(role) {
  selected = role;
  if (!role) { detail.style.display = "none"; return; }
  const a = avatars.get(role), st = deskState(role);
  detail.innerHTML =
    `<h2>${esc(a.title)}</h2>` +
    `<div class="row"><span class="k">role</span><span>${esc(role)}</span></div>` +
    `<div class="row"><span class="k">tier</span><span>${esc(a.tier)}</span></div>` +
    `<div class="row"><span class="k">dept</span><span>${esc(a.dept)}</span></div>` +
    `<div class="row"><span class="k">state</span><span>${esc(st.ring)}</span></div>` +
    `<div class="row"><span class="k">tokens</span><span>${esc(st.tokens.toLocaleString())}</span></div>` +
    (st.tool ? `<div class="row"><span class="k">tool</span><span>${esc(st.tool)}</span></div>` : "") +
    (st.summary ? `<div class="sum">${esc(st.summary)}</div>` : `<div class="sum k">no capsule yet</div>`) +
    `<button id="unfollow">${following === role ? "stop following" : "follow"}</button>`;
  detail.style.display = "block";
  document.getElementById("unfollow").onclick = () => {
    following = following === role ? null : role;
    showDetail(role);
  };
}

el.addEventListener("click", (e) => {
  if (dragged) return;
  const role = pickAgent(e);
  following = role;
  showDetail(role);
});

addEventListener("keydown", (e) => {
  if (e.key === "Escape") { following = null; showDetail(null); }
});

function hoverTest(e) {
  const r = el.getBoundingClientRect();
  ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);

  let best = null, bestDist = Infinity;
  for (const [role, a] of avatars) {
    const hits = ray.intersectObject(a.hit, true);
    if (hits.length && hits[0].distance < bestDist) { bestDist = hits[0].distance; best = role; }
  }
  if (!best) { tip.style.display = "none"; return; }

  const a = avatars.get(best), st = deskState(best);
  tip.innerHTML =
    `<b>${esc(a.title)}</b><div class="s">tier ${esc(a.tier)} &middot; ${esc(a.dept)} &middot; ${esc(st.ring)}</div>` +
    (st.tool ? `<div class="s">tool: ${esc(st.tool)}</div>` : "") +
    (st.tokens ? `<div class="s">${esc(st.tokens.toLocaleString())} tokens</div>` : "") +
    (st.summary ? `<div>${esc(st.summary)}</div>` : "");
  tip.style.display = "block";
  tip.style.left = Math.min(e.clientX - r.left + 14, r.width - 300) + "px";
  tip.style.top = (e.clientY - r.top + 14) + "px";
}

function resize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  updateCamera();
}
addEventListener("resize", resize);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();
  for (const [role, a] of avatars) {
    const st = deskState(role);
    const stuck = st.ring === "error" || st.ring === "blocked";
    const busy = st.ring === "running" || st.ring === "meeting" || stuck;
    const walking = wanderStep(a, busy, dt, t);

    if (walking) {
      a.body.position.y = Math.abs(Math.sin(t * 9 + a.seed)) * 0.05;
      a.body.rotation.z = Math.sin(t * 9 + a.seed) * 0.05;
      let d = a.facing - a.body.rotation.y;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      a.body.rotation.y += d * 0.16;
    } else if (stuck) {
      a.body.position.y = 0;
      a.body.rotation.z = 0;
      a.body.rotation.y += (0 - a.body.rotation.y) * 0.08;
    } else {
      a.body.position.y = busy
        ? Math.sin(t * 6 + a.seed) * 0.02
        : Math.sin(t * 1.3 + a.seed) * 0.007;
      a.body.rotation.z = 0;
      const rest = busy ? Math.sin(t * 3 + a.seed) * 0.06 : 0;
      a.body.rotation.y += (rest - a.body.rotation.y) * 0.08;
    }

    if (stuck) {
      a.ringMat.opacity = 0.55 + Math.sin(t * 7 + a.seed) * 0.45;
    } else {
      a.ringMat.opacity = st.ring === "idle" ? 0.28 : 0.7 + Math.sin(t * 4 + a.seed) * 0.3;
    }
    if (a.alarm) {
      a.alarm.visible = stuck;
      if (stuck) a.alarm.intensity = 2.6 + Math.sin(t * 7 + a.seed) * 2.0;
    }

    const lit = st.ring === "running" || st.ring === "meeting";
    if (a.lamp) {
      a.lamp.visible = lit || stuck;
      if (a.lamp.visible) {
        const tint = stuck ? RING.error : RING[st.ring];
        a.bulb.material.color.setHex(tint);
        a.cone.material.color.setHex(tint);
        a.pool.material.color.setHex(tint);
        a.spot.color.setHex(tint);
        const pulse = stuck ? 7 : 3.4;
        const w = 0.5 + Math.sin(t * pulse + a.seed) * 0.5;
        a.bulb.material.opacity = 0.6 + w * 0.4;
        a.bulb.scale.setScalar(1 + w * 0.2);
        a.cone.material.opacity = 0.11 + w * 0.10;
        a.pool.material.opacity = 0.14 + w * 0.12;
        a.spot.intensity = 22 + w * 22;
      }
    }
  }

  for (const a of ambient) {
    const walking = wanderStep(a, false, dt, t);
    if (walking) {
      a.body.position.y = Math.abs(Math.sin(t * 9 + a.seed)) * 0.05;
      a.body.rotation.z = Math.sin(t * 9 + a.seed) * 0.05;
      let d = a.facing - a.body.rotation.y;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      a.body.rotation.y += d * 0.16;
    } else {
      a.body.position.y = Math.sin(t * 1.3 + a.seed) * 0.007;
      a.body.rotation.z = 0;
    }
  }
  if (t - lastMini > 0.25) { renderMinimap(); lastMini = t; }

  if (screensDirty && t - lastScreenPaint > 0.4) {
    refreshScreens(screenData());
    screensDirty = false;
    lastScreenPaint = t;
  }

  if (following && avatars.has(following)) {
    const p = avatars.get(following).person.position;
    orbit.target.x += (p.x - orbit.target.x) * 0.08;
    orbit.target.z += (p.z - orbit.target.z) * 0.08;
    updateCamera();
  }

  renderer.render(scene, camera);
}

function setRing(role, name) {
  const a = avatars.get(role);
  if (!a) return;
  deskState(role).ring = name;
  a.ringMat.color.setHex(RING[name] || RING.idle);
}

const roleOf = (actor) => (actor || "").split("#")[0];

function resetState() {
  for (const [role, a] of avatars) {
    state.set(role, { ring: "idle", summary: "", tool: "", tokens: 0 });
    a.ringMat.color.setHex(RING.idle);
    if (a.meetingSeat) leaveTable(a);
  }
  meetings.clear();
  hideBoard();
  workflow = null;
  stats = { events: 0, tokens: 0, spend: 0, cacheRead: 0, cacheWrite: 0, symbols: 0, run: stats.run, history: [], feed: [] };
}

function rebuildTo(seq) {
  resetState();
  for (const ev of allEvents) {
    if (ev.seq > seq) break;
    apply(ev, true);
  }
  renderStats();
  renderTrack();
  refreshScreens(screenData());
}

function apply(ev, replaying) {
  const role = roleOf(ev.actor);
  const known = avatars.has(role);
  const st = known ? deskState(role) : null;

  switch (ev.type) {
    case "run_started": stats.run = ev.run; break;
    case "worker_spawned": if (known) { setRing(role, "running"); st.summary = ""; } break;
    case "worker_state_changed":
      if (known) {
        const to = ev.data.to;
        setRing(role,
          to === "reaped" || to === "refused" ? "idle" :
          to === "stalled" || to === "timed_out" ? "error" :
          to === "rate_limited" ? "blocked" : "running");
      }
      break;
    case "worker_exited": if (known) setRing(role, ev.data.outcome === "completed" ? "idle" : "error"); break;
    case "tool_call": if (st) st.tool = ev.data.tool || ""; break;
    case "meeting_started": {
      const ids = (ev.data.participants || []).filter((r) => avatars.has(r));
      meetings.set(ev.data.meeting_id, ids);
      showBoard(ev.data.kind, ev.data.topic, ev.data.participants, ev.data.chair);
      ids.forEach((r, i) => {
        setRing(r, "meeting");
        if (meetingTable) seatAtTable(avatars.get(r), meetingTable, i, ids.length);
      });
      break;
    }
    case "meeting_ended": {
      const ids = meetings.get(ev.data.meeting_id) || [];
      ids.forEach((r) => {
        setRing(r, "idle");
        leaveTable(avatars.get(r));
      });
      meetings.delete(ev.data.meeting_id);
      if (!meetings.size) hideBoard();
      break;
    }
    case "escalated": if (known) setRing(role, "blocked"); break;
    case "capsule_submitted": if (st) st.summary = ev.data.summary || st.summary; break;
    case "verify_result": if (known) setRing(role, ev.data.verdict === "pass" ? "running" : "error"); break;
    case "workflow_started":
      workflow = { id: ev.data.workflow, title: ev.data.title || ev.data.workflow,
                   nodes: ev.data.nodes || [], entered: [], skipped: [], gates: {}, done: false };
      break;
    case "node_entered":
      if (workflow) {
        if (ev.data.skipped) workflow.skipped.push(ev.data.node);
        else workflow.entered.push(ev.data.node);
      }
      break;
    case "gate_evaluated":
      if (workflow) workflow.gates[ev.data.gate] = ev.data.passed;
      break;
    case "workflow_ended":
      if (workflow) { workflow.done = true; workflow.outcome = ev.data.outcome; }
      break;
    case "index_updated":
      stats.symbols = Math.max(0, stats.symbols + (ev.data.symbols_delta || 0));
      break;
    case "budget_approval_needed":
      if (!replaying) showApproval(ev.data);
      break;
    case "token_usage": {
      const d = ev.data;
      stats.tokens += (d.input || 0) + (d.output || 0);
      stats.spend += d.cost_usd || 0;
      stats.cacheRead += d.cache_read || 0;
      stats.cacheWrite += d.cache_creation || 0;
      if (st) st.tokens += (d.input || 0) + (d.output || 0);
      break;
    }
  }
  if (!replaying) allEvents.push(ev);
  stats.events++;
  stats.history.push(Math.min(1, ((ev.data && ev.data.output) || 8) / 120));
  if (stats.history.length > 26) stats.history.shift();
  stats.feed.push({ seq: ev.seq, type: ev.type, bad: BAD.has(ev.type) });
  if (stats.feed.length > 12) stats.feed.shift();
  if (!replaying) {
    renderStats();
    renderTrack();
  }
  screensDirty = true;
}

const trackEl = document.getElementById("track");
function renderTrack() {
  if (!workflow) { trackEl.style.display = "none"; return; }
  trackEl.style.display = "block";
  trackEl.querySelector(".name").textContent =
    workflow.title + (workflow.done ? "  \u00b7  " + workflow.outcome : "  \u00b7  running");

  const parts = [];
  workflow.nodes.forEach((n, i) => {
    if (i) parts.push('<span class="arrow">&rsaquo;</span>');
    const cls = workflow.skipped.includes(n) ? "skipped"
      : workflow.entered.includes(n) ? (workflow.entered[workflow.entered.length - 1] === n && !workflow.done ? "active" : "done")
      : "";
    parts.push('<span class="chip ' + cls + '">' + esc(n) + "</span>");
    if (n in workflow.gates) {
      const ok = workflow.gates[n];
      parts.push('<span class="gate ' + (ok ? "pass" : "fail") + '">' + (ok ? "gate pass" : "gate fail") + "</span>");
    }
  });
  trackEl.querySelector(".lane").innerHTML = parts.join(" ");
}

const mini = document.getElementById("minimap");
const mctx = mini.getContext("2d");
let miniFloor = null;
function renderMinimap() {
  if (!miniFloor) return;
  const sx = mini.width / miniFloor.width, sy = mini.height / miniFloor.height;
  mctx.clearRect(0, 0, mini.width, mini.height);
  for (const r of miniFloor.rooms.concat([miniFloor.lobby])) {
    mctx.fillStyle = r.department === "lobby" ? "rgba(148,163,184,.16)" : "rgba(148,163,184,.09)";
    mctx.fillRect(r.x * sx, r.y * sy, r.w * sx, r.h * sy);
    mctx.strokeStyle = "rgba(148,163,184,.22)";
    mctx.strokeRect(r.x * sx, r.y * sy, r.w * sx, r.h * sy);
  }
  for (const d of miniFloor.desks) {
    const st = deskState(d.role);
    mctx.fillStyle = "#" + (RING[st.ring] || RING.idle).toString(16).padStart(6, "0");
    mctx.fillRect(d.x * sx - 1, d.y * sy - 1, Math.max(3, d.w * sx), Math.max(3, d.h * sy));
  }
}

function renderStats() {
  document.getElementById("s-run").textContent = stats.run;
  document.getElementById("s-events").textContent = stats.events.toLocaleString();
  document.getElementById("s-tokens").textContent = stats.tokens.toLocaleString();
  document.getElementById("s-spend").textContent = "$" + stats.spend.toFixed(4);
  const tot = stats.cacheRead + stats.cacheWrite;
  document.getElementById("s-cache").textContent = tot ? ((stats.cacheRead / tot) * 100).toFixed(0) + "%" : "-";
  document.getElementById("s-symbols").textContent = stats.symbols ? stats.symbols.toLocaleString() : "-";
}

const feed = document.getElementById("feed");
function logEvent(ev) {
  const row = document.createElement("div");
  row.className = "ev" + (TERMINAL.has(ev.type) ? " terminal" : "") + (BAD.has(ev.type) ? " bad" : "");
  const who = ev.actor === "daemon" ? "" : " " + roleOf(ev.actor);
  row.innerHTML = `<span class="seq">${esc(ev.seq)}</span><span class="t">${esc(ev.type)}${esc(who)}</span>`;
  feed.appendChild(row);
  while (feed.childElementCount > 400) feed.removeChild(feed.firstChild);
  feed.scrollTop = feed.scrollHeight;
}

const conn = document.getElementById("conn");
let lastSeq = 0;
function connect() {
  const run = new URLSearchParams(location.search).get("run");
  const url = new URL("/ws", location.href);
  url.protocol = location.protocol === "https:" ? "wss:" : "ws:";
  if (run) url.searchParams.set("run", run);
  url.searchParams.set("since_seq", String(lastSeq));
  const ws = new WebSocket(url);
  ws.onopen = () => { conn.textContent = "live"; conn.className = "live"; };
  ws.onclose = () => { conn.textContent = "reconnecting"; conn.className = "down"; setTimeout(connect, 1000); };
  ws.onmessage = (m) => {
    let ev; try { ev = JSON.parse(m.data); } catch { return; }
    if (typeof ev.seq === "number") lastSeq = Math.max(lastSeq, ev.seq);
    if (scrubbing) { allEvents.push(ev); seek.max = String(lastSeq); return; }
    apply(ev); logEvent(ev);
    seek.max = String(lastSeq);
    seek.value = String(lastSeq);
    seekLabel.textContent = "live";
  };
}

const who = document.getElementById("who");
const briefBox = document.getElementById("brief");
const sent = document.getElementById("sent");
const modeBtn = document.getElementById("mode-btn");
const MODES = ["build", "task", "meeting"];
let composeMode = "build";

function applyMode() {
  modeBtn.textContent = composeMode;
  const pickers = composeMode !== "build";
  who.style.display = pickers ? "" : "none";
  who.multiple = composeMode === "meeting";
  who.size = composeMode === "meeting" ? 5 : 1;
  briefBox.placeholder =
    composeMode === "build" ? "describe the game; the studio decides who does what"
    : composeMode === "task" ? "what should they do?"
    : "what is the meeting about?";
}

modeBtn.onclick = () => {
  composeMode = MODES[(MODES.indexOf(composeMode) + 1) % MODES.length];
  applyMode();
};
applyMode();

fetch("/roles").then((r) => r.json()).then((rows) => {
  who.innerHTML = rows
    .map((r) => `<option value="${esc(r.id)}">${esc(r.title)}</option>`)
    .join("");
});

const askBox = document.getElementById("ask");
const askBody = document.getElementById("ask-body");
let pendingApproval = null;

function showApproval(d) {
  pendingApproval = d.approval_id;
  const tokens = Number(d.spent || 0).toLocaleString();
  const usd = Number(d.usd || 0).toFixed(2);
  askBody.textContent =
    `This run has billed ${tokens} tokens (about $${usd}) and is waiting at node ` +
    `${d.node}. Continue, and I will ask again after the next ${Number(d.threshold || 0).toLocaleString()}.`;
  askBox.hidden = false;
}

async function answerApproval(approve) {
  if (!pendingApproval) return;
  const id = pendingApproval;
  pendingApproval = null;
  askBox.hidden = true;
  try {
    await fetch("/approve", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ approval_id: id, approve }),
    });
    sent.textContent = approve ? "carrying on" : "stopping after this node";
  } catch (err) {
    sent.textContent = "could not reach the daemon";
  }
}

document.getElementById("ask-yes").onclick = () => answerApproval(true);
document.getElementById("ask-no").onclick = () => answerApproval(false);

const projectSel = document.getElementById("project");
const projectForm = document.getElementById("project-form");

function renderProjects(rows) {
  if (!rows.length) {
    projectSel.innerHTML = `<option value="">no project yet - create one</option>`;
    projectSel.classList.add("none");
    return;
  }
  projectSel.classList.remove("none");
  const remembered = localStorage.getItem("studio.project");
  projectSel.innerHTML = rows
    .map((p) => `<option value="${esc(p.id)}" title="${esc(p.root)}">${esc(p.name)}${p.git ? " *" : ""}</option>`)
    .join("");
  if (remembered && rows.some((p) => p.id === remembered)) projectSel.value = remembered;
}

function loadProjects() {
  return fetch("/projects").then((r) => r.json()).then(renderProjects).catch(() => {});
}
loadProjects();

projectSel.onchange = () => localStorage.setItem("studio.project", projectSel.value);

document.getElementById("new-project").onclick = () => {
  projectForm.hidden = !projectForm.hidden;
};

document.getElementById("np-create").onclick = async () => {
  const body = {
    name: document.getElementById("np-name").value.trim(),
    root: document.getElementById("np-root").value.trim(),
    engine: document.getElementById("np-engine").value,
    git: document.getElementById("np-git").checked,
  };
  if (!body.name || !body.root) { sent.textContent = "a project needs a name and a path"; return; }

  sent.textContent = "creating";
  try {
    const res = await fetch("/projects", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    if (!res.ok) { sent.textContent = await res.text(); return; }
    const made = await res.json();
    localStorage.setItem("studio.project", made.id);
    await loadProjects();
    projectSel.value = made.id;
    projectForm.hidden = true;
    document.getElementById("np-name").value = "";
    document.getElementById("np-root").value = "";
    sent.textContent = made.git ? `${made.name} ready, git initialised` : `${made.name} ready`;
  } catch (err) {
    sent.textContent = "the daemon is not reachable";
  }
};

document.getElementById("send").onclick = async () => {
  const brief = briefBox.value.trim();
  if (!brief) { sent.textContent = "write a brief first"; return; }
  const picked = [...who.selectedOptions].map((o) => o.value);
  if (composeMode !== "build" && !picked.length) { sent.textContent = "pick someone"; return; }
  if (composeMode === "meeting" && picked.length < 2) {
    sent.textContent = "a meeting needs at least two";
    return;
  }

  const project = projectSel.value || null;
  if (composeMode !== "meeting" && !project) {
    sent.textContent = "pick or create a project first";
    return;
  }

  const url = composeMode === "build" ? "/build"
    : composeMode === "task" ? "/task" : "/meeting";
  const askRaw = document.getElementById("spend").value;
  const ask_above = askRaw ? Number(askRaw) : null;

  const body = composeMode === "build" ? { prompt: brief, project, ask_above }
    : composeMode === "task" ? { role: picked[0], brief, project }
    : { kind: "arbitration", participants: picked, topic: brief };

  sent.textContent = "sending";
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    sent.textContent = res.ok
      ? (composeMode === "build" ? "the director is planning it" : "queued on the floor")
      : await res.text();
    if (res.ok) briefBox.value = "";
  } catch (err) {
    sent.textContent = "the daemon is not accepting work";
  }
};

const seek = document.getElementById("seek");
const seekLabel = document.querySelector("#scrub .lbl");
seek.addEventListener("input", () => {
  scrubbing = Number(seek.value) < lastSeq;
  seekLabel.textContent = scrubbing ? "seq " + seek.value : "live";
  rebuildTo(Number(seek.value));
});
document.getElementById("tolive").onclick = () => {
  scrubbing = false;
  seek.value = String(lastSeq);
  seekLabel.textContent = "live";
  rebuildTo(lastSeq);
};

fetch("/floor").then((r) => r.json()).then((f) => {
  miniFloor = f;
  fitShadowToFloor(f);
  const built = buildOffice(f, scene);
  avatars = built.avatars;
  ambient = built.ambient || [];
  meetingTable = built.meetingTable;
  resize();
  refreshScreens(screenData());
  animate();
  connect();
});
</script>
